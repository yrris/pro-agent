# Grafana Tempo（单体模式）——my-agent trace 后端（docs/18 §3.2 直连，无 collector 中转）。
# 原生 OTLP receiver：Go 控制面与 Python 认知面把 span 直接导出到 tempo:4317（gRPC）。
# 本地文件存储（MVP 无需对象存储 / 集群 / tail-sampling）。

server:
  http_listen_port: 3200 # 查询 API（Grafana Tempo datasource 经此读 trace）
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317 # 两面服务的 OTLP/gRPC 导出目标
        http:
          endpoint: 0.0.0.0:4318 # OTLP/HTTP（备用）

ingester:
  max_block_duration: 5m # 快落块，便于本地开发/冒烟即时可查

compactor:
  compaction:
    block_retention: 24h # MVP 保留 1 天足够（简历演示/联调）

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
